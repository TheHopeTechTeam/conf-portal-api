name: STG Deploy

on:
  push:
    branches:
      - main

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-docker:
    runs-on: ubuntu-latest
    name: "Docker build"
    environment:
      name: image
      # package url
      url: "https://github.com/${{ github.repository }}/pkgs/container/conf-portal-api"
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=sha,prefix=,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
      - name: Echo info
        run: |-
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "REGISTRY: ${{ env.REGISTRY }}"
          echo "IMAGE_NAME: ${{ env.IMAGE_NAME }}"
          echo "USER: ${{ vars.CONTAINER_REGISTRY_USER }}"
          echo "TAGS: ${{ steps.meta.outputs.tags }}"
          echo "LABELS: ${{ steps.meta.outputs.labels }}"
      - name: Login to registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.CONTAINER_REGISTRY_USER }}
          password: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  update-service-stg:
    if: github.ref == format('refs/heads/{0}', 'main')
    needs: build-docker
    runs-on: ubuntu-latest
    name: "Update service STG"
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=sha,prefix=,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
      - name: Update service
        run: |-
          #!/usr/bin/env bash
          set -euo pipefail

          curl --location --request PATCH 'https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_STG }}' \
            --header 'authorization: Bearer ${{ secrets.RENDER_API_KEY }}' \
            --header 'Content-Type: application/json' \
            --data '{
              "image": {
                "ownerId":"${{ secrets.RENDER_OWNER_ID }}",
                "registryCredentialId":"${{ secrets.RENDER_REGISTRY_CREDENTIAL_ID }}",
                "imagePath":"${{ steps.meta.outputs.tags }}"
              }
            }'

          # Sentry release / APP_VERSION = docker/metadata-action primary tag (same as registry tag suffix).
          curl --location --request PUT 'https://api.render.com/v1/env-groups/${{ secrets.RENDER_ENVIRONMENT_STG_ID }}/env-vars/VERSION' \
            --header 'accept: application/json' \
            --header 'content-type: application/json' \
            --header 'Authorization: Bearer ${{ secrets.RENDER_API_KEY }}' \
            --data '{"value": "${{ steps.meta.outputs.version }}"}'
  deploy-stg:
    if: github.ref == format('refs/heads/{0}', 'main')
    needs: update-service-stg
    runs-on: ubuntu-latest
    name: "Deploy"
    steps:
      - name: Deploy
        run: |-
          #!/usr/bin/env bash
          set -euo pipefail

          curl --location --request POST 'https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_STG }}/deploys' \
            --header 'authorization: Bearer ${{ secrets.RENDER_API_KEY }}' \
            --header 'Content-Type: application/json'

  sentry-release-stg:
    if: github.ref == format('refs/heads/{0}', 'main')
    needs: deploy-stg
    runs-on: ubuntu-latest
    name: Sentry release STG (set commits)
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=sha,prefix=,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          # Must match Render `VERSION` / `APP_VERSION` (Docker image tag from metadata).
          release: ${{ steps.meta.outputs.version }}
          environment: stg
          set_commits: auto

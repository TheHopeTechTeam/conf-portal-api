name: Release

on:
  push:
    tags:
      - "*.*.*"


env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  # Opts JS actions (e.g. softprops/action-gh-release) into Node 24; see action-gh-release release notes.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  build-docker:
    runs-on: ubuntu-latest
    name: "Docker build"
    environment:
      name: image
      # package url
      url: "https://github.com/${{ github.repository }}/pkgs/container/conf-portal-api"
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - name: Echo info
        run: |-
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "REGISTRY: ${{ env.REGISTRY }}"
          echo "IMAGE_NAME: ${{ env.IMAGE_NAME }}"
          echo "USER: ${{ vars.CONTAINER_REGISTRY_USER }}"
          echo "TAGS: ${{ steps.meta.outputs.tags }}"
          echo "LABELS: ${{ steps.meta.outputs.labels }}"
      - name: Login to registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.CONTAINER_REGISTRY_USER }}
          password: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
            context: .
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}

  update-service-prod:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-docker
    runs-on: ubuntu-latest
    name: "Update PROD & STG (image + VERSION)"
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - name: Update service
        run: |-
          #!/usr/bin/env bash
          set -euo pipefail

          curl --location --request PATCH 'https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}' \
            --header 'authorization: Bearer ${{ secrets.RENDER_API_KEY }}' \
            --header 'Content-Type: application/json' \
            --data '{
              "image": {
                "ownerId":"${{ secrets.RENDER_OWNER_ID }}",
                "registryCredentialId":"${{ secrets.RENDER_REGISTRY_CREDENTIAL_ID }}",
                "imagePath":"${{ steps.meta.outputs.tags }}"
              }
            }'

          curl --location --request PATCH 'https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_STG }}' \
            --header 'authorization: Bearer ${{ secrets.RENDER_API_KEY }}' \
            --header 'Content-Type: application/json' \
            --data '{
              "image": {
                "ownerId":"${{ secrets.RENDER_OWNER_ID }}",
                "registryCredentialId":"${{ secrets.RENDER_REGISTRY_CREDENTIAL_ID }}",
                "imagePath":"${{ steps.meta.outputs.tags }}"
              }
            }'

          curl --location --request PUT 'https://api.render.com/v1/env-groups/${{ secrets.RENDER_ENVIRONMENT_STG_ID }}/env-vars/VERSION' \
            --header 'accept: application/json' \
            --header 'content-type: application/json' \
            --header 'Authorization: Bearer ${{ secrets.RENDER_API_KEY }}' \
            --data '{"value": "${{ steps.meta.outputs.version }}"}'

          curl --location --request PUT 'https://api.render.com/v1/env-groups/${{ secrets.RENDER_ENVIRONMENT_PROD_ID }}/env-vars/VERSION' \
            --header 'accept: application/json' \
            --header 'content-type: application/json' \
            --header 'Authorization: Bearer ${{ secrets.RENDER_API_KEY }}' \
            --data '{"value": "${{ steps.meta.outputs.version }}"}'

  deploy-stg:
    if: startsWith(github.ref, 'refs/tags/')
    needs: update-service-prod
    runs-on: ubuntu-latest
    name: "Deploy STG"
    steps:
      - name: Deploy STG
        run: |-
          #!/usr/bin/env bash
          set -euo pipefail

          curl --location --request POST 'https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_STG }}/deploys' \
            --header 'authorization: Bearer ${{ secrets.RENDER_API_KEY }}' \
            --header 'Content-Type: application/json'

  github-release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    needs: deploy-stg
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Build release notes from CHANGELOG
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          file="CHANGELOG.md"
          out="release_body.md"
          rm -f extracted.md
          if [[ -f "${file}" ]]; then
            awk -v ver="${tag}" '
              /^## \[/ {
                if (p) exit
                if ($0 ~ "\\[" ver "\\]") { p=1; print; next }
                next
              }
              p { print }
            ' "${file}" > extracted.md || true
          fi
          if [[ -f extracted.md ]] && [[ -s extracted.md ]]; then
            mv extracted.md "${out}"
          else
            {
              echo "## Summary"
              echo ""
              echo "No \`CHANGELOG.md\` section found for \`${tag}\`. Add \`## [${tag}]\` (Keep a Changelog style) before tagging, or rely on the auto-generated list below."
              echo ""
            } > "${out}"
          fi

      # softprops/action-gh-release@v2 still declares `runs.using: node20`, so GitHub may show a Node 20
      # deprecation notice on the run summary. The action author is working on a Node 24 upgrade; until a
      # new release ships, `FORCE_JAVASCRIPT_ACTIONS_TO_NODE24` (workflow env above) opts JS actions into Node 24.
      # https://github.com/softprops/action-gh-release/pull/670
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.md
          generate_release_notes: true
          make_latest: true

  sentry-release:
    name: Sentry release (set commits)
    if: github.ref_type == 'tag'
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          # Must match `sentry_sdk.init(release=...)` / `APP_VERSION` (semver tag without `v`).
          release: ${{ github.ref_name }}
          environment: production
          set_commits: auto
